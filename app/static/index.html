<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OA Judge</title>
    <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <button class="icon-btn" id="sidebar-toggle" title="Toggle problem list" aria-label="Toggle problem list">☰</button>
            <span class="app-name">OA&nbsp;Judge</span>
            <span class="breadcrumb" id="breadcrumb">Select a problem</span>
        </div>
        <div class="header-right">
            <button class="icon-btn" id="btn-sync" title="Pull the latest shared problems">⟳ Sync</button>
            <button class="icon-btn" id="btn-add-problem" title="Add a new problem to the shared bank">＋ Add</button>
            <button class="icon-btn" id="btn-stats" title="Your solving statistics">📊 Stats</button>
            <button class="icon-btn" id="theme-toggle" title="Toggle light / dark" aria-label="Toggle theme">◐</button>
            <span class="user-chip" id="user-chip" style="display:none">
                <img id="user-avatar" alt="" width="22" height="22">
                <span id="user-login"></span>
                <button class="icon-btn" id="btn-logout" title="Sign out">Sign out</button>
            </span>
        </div>
    </header>

    <div class="workspace">
        <!-- Problem list -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-heading">Problems</div>
            <div id="problem-list" class="problem-list"></div>
        </aside>

        <!-- Statement / editorial -->
        <section class="statement-pane" id="left-pane">
            <div class="tabs" id="tabs">
                <button class="tab-btn active" data-tab="statement">Problem</button>
                <button class="tab-btn" data-tab="editorial">Editorial</button>
                <button class="tab-btn" data-tab="attempts">Attempts <span class="tab-count" id="attempts-count"></span></button>
                <button class="tab-btn" data-tab="notes">Notes</button>
            </div>
            <div class="pane-scroll">
                <div class="tab-content active" id="tab-statement">
                    <p class="placeholder">Select a problem from the list to begin.</p>
                </div>
                <div class="tab-content" id="tab-editorial"></div>
                <div class="tab-content" id="tab-attempts"></div>
                <div class="tab-content" id="tab-notes"></div>
            </div>
        </section>

        <div class="divider" id="divider" title="Drag to resize"></div>

        <!-- Code workspace -->
        <section class="editor-pane" id="right-pane">
            <div class="editor-toolbar">
                <select id="lang-select" class="lang-select" title="Language"></select>
                <span class="save-status" id="save-status" title="Drafts autosave to the local database"></span>
                <div class="toolbar-spacer"></div>
                <button class="icon-btn" id="btn-history" title="Replay your saved drafts for this problem">🕑 History</button>
                <button class="icon-btn" id="btn-reset-stub" title="Reset editor to the starter code">↺ Reset</button>
            </div>

            <!-- Monaco mounts here. The old textarea + highlight-overlay pair is gone: keeping
                 two layers pixel-aligned is what caused the caret-drift bugs. -->
            <div class="editor-wrapper">
                <div id="monaco-host" class="monaco-host"></div>
            </div>

            <!-- Custom input drawer -->
            <div class="drawer" id="custom-input-drawer">
                <div class="drawer-head">
                    <span class="drawer-title">Custom Input</span>
                    <button class="drawer-close" id="drawer-close-custom" title="Close">×</button>
                </div>
                <div class="drawer-body">
                    <textarea id="custom-stdin" class="custom-stdin" rows="5" spellcheck="false"
                              placeholder="Type input here — it's fed to your program on stdin when you press Run."></textarea>
                </div>
            </div>

            <!-- Results drawer -->
            <div class="drawer result-drawer" id="result-drawer">
                <div class="drawer-head">
                    <span class="drawer-title" id="drawer-title">Results</span>
                    <button class="drawer-close" id="drawer-close-result" title="Close">×</button>
                </div>
                <div class="drawer-body" id="console"></div>
            </div>

            <div class="editor-footer">
                <div class="footer-left">
                    <div class="mode-switch" role="group" aria-label="Mode">
                        <label class="mode-opt"><input type="radio" name="mode" value="lc" checked><span>LC</span></label>
                        <label class="mode-opt"><input type="radio" name="mode" value="oa"><span>OA</span></label>
                    </div>
                    <span class="oa-timer" id="oa-timer" title="Elapsed time">00:00</span>
                    <button class="btn btn-ghost" id="btn-reset-oa" style="display:none">Reveal / Reset</button>
                </div>
                <div class="footer-right">
                    <button class="btn btn-subtle" id="btn-custom-input-toggle" title="Toggle the custom-input box">Custom Input</button>
                    <button class="btn btn-subtle" id="btn-stress" title="Race your code against the reference on random inputs to surface the smallest input where it fails">Find Failing Test</button>
                    <button class="btn btn-neutral" id="btn-run" title="Compile and run once against your custom input">Run</button>
                    <button class="btn btn-primary" id="btn-submit" title="Judge against all tests (Ctrl/Cmd+Enter)">Submit</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Login gate (hosted, multi-user mode only). Hidden locally. -->
    <div class="login-overlay" id="login-overlay" style="display:none">
        <div class="login-card">
            <div class="login-logo">OA&nbsp;Judge</div>
            <p class="login-sub">Sign in to keep your attempts, drafts and stats private to you.</p>
            <a class="login-btn" id="login-btn" href="/auth/login">
                <span class="gh-mark">&#9679;</span> Sign in with GitHub
            </a>
        </div>
    </div>

    <!-- Modal shell: reused for Stats, the attempt diff, and the draft scrubber. -->
    <div class="modal-overlay" id="modal-overlay" style="display:none">
        <div class="modal" id="modal">
            <div class="modal-head">
                <span class="modal-title" id="modal-title"></span>
                <div class="modal-actions" id="modal-actions"></div>
                <button class="drawer-close" id="modal-close" title="Close">×</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="/static/editor.js?v=7"></script>
    <script src="/static/app.js?v=7"></script>
</body>
</html>
