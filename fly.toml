# fly.toml app configuration file generated for oa123 on 2026-07-24T02:24:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'oa123'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  OAJ_DB = '/data/judge.db'
  OAJ_EXEC_BACKEND = 'local'
  OAJ_HOST = '0.0.0.0'
  OAJ_PORT = '5137'
  OAJ_PROBLEMS_DIR = '/problems'

[[mounts]]
  source = 'oaj_data'
  destination = '/data'

[http_service]
  internal_port = 5137
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
